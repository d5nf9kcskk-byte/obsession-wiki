name: Deploy Obsession Wiki

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          # Set this as a repository variable (Settings → Secrets and variables →
          # Actions → Variables) to the deployed Cloudflare Worker URL. When unset,
          # the Ask AI chat shows a "not configured" notice instead of erroring.
          VITE_AI_PROXY_URL: ${{ vars.VITE_AI_PROXY_URL }}

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v5
